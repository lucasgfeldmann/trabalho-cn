name: CI/CD Docker Hub to Swarm Imadiato

on:
  push:
    branches: [ "main" ]

env:
  DOCKER_USER: lucasgfeldmann
  IMAGE_NAME: trabalho-cn-app

jobs:
  # PASSO 1: Constrói a imagem e envia para o Docker Hub (Nuvem do GitHub)
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_USER }}/${{ env.IMAGE_NAME }}:latest

  # PASSO 2: Manda a VM atualizar (Imediato, via Self-Hosted Runner)
  deploy-to-swarm:
    needs: build-and-push # Só dispara se o build acima der certo
    runs-on: self-hosted  # <--- Isso faz o comando rodar direto na sua VM!

    steps:
      - name: Atualizar o Docker Swarm
        run: |
          # Como esse comando já está rodando fisicamente no seu Manager, 
          # basta digitar o comando do Docker.
          # ATENÇÃO: Troque 'NOME_DO_SEU_SERVICO' pelo nome real do serviço no Swarm
          docker service update --image ${{ env.DOCKER_USER }}/${{ env.IMAGE_NAME }}:latest --force vigilant_fermi